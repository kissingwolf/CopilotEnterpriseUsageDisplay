<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cost Center 管理</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <header class="topbar topbar-row">
          <h1 id="pageTitle">Cost Center 管理</h1>
          <a id="backLink" class="back-link" href="/">返回用量看板</a>
        </header>

        <div class="query-bar">
          <div class="query-bar-left">
            <label for="stateSel" class="auto-label">状态筛选</label>
            <select id="stateSel" class="auto-select">
              <option value="">全部</option>
              <option value="active" selected>active</option>
              <option value="deleted">deleted</option>
            </select>
            <button id="refreshBtn" class="refresh-btn">刷新</button>
          </div>
        </div>

        <p id="meta" class="meta">尚未刷新数据</p>
        <div id="error" class="error" hidden></div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>名称</th>
                <th class="cc-money-col">席位订阅费</th>
                <th>套餐外预算</th>
                <th>状态</th>
                <th>用户数量</th>
              </tr>
            </thead>
            <tbody id="tbody">
              <tr>
                <td colspan="5" class="empty">暂无数据，请点击"刷新"。</td>
              </tr>
            </tbody>
          </table>
        </div>

        <section id="teamAssignPanel" class="cc-assign-panel" hidden>
          <h2>按 Team 批量加入 Cost Center Users</h2>
          <p class="cc-panel-desc">选择一个或多个 Team，将 Team 成员批量加入当前 cost center 的 Users 资源。</p>
          <div class="cc-team-toolbar">
            <label class="cc-team-check-all">
              <input type="checkbox" id="ccTeamAll" /> 全选 Team
            </label>
            <button id="ccPreviewBtn" class="info-btn" type="button">预览变更</button>
            <button id="ccApplyBtn" class="refresh-btn" type="button">确认加入 Users</button>
          </div>
          <div id="ccTeamList" class="cc-team-list"></div>
          <div id="ccAssignResult" class="cc-assign-result" hidden></div>
        </section>
      </section>
    </main>

    <script src="/common.js"></script>
    <script src="/costcenter.js"></script>
  </body>
</html>
