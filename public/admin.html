<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>后台管理 · Copilot 用量看板</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      /* ===== Admin 页面专属样式（与全局 design system 共用变量） ===== */
      .admin-shell {
        max-width: 480px;
        margin: 0 auto;
      }
      .admin-shell .topbar {
        justify-content: center;
      }
      .admin-body {
        padding: 32px 28px 36px;
      }
      .admin-subtitle {
        margin: 0 0 24px;
        color: var(--muted);
        font-size: 14px;
        text-align: center;
      }
      .admin-form {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .admin-field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .admin-field label {
        font-size: 13px;
        color: var(--muted);
      }
      .admin-field input {
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        font-size: 14px;
        font-family: inherit;
        background: var(--bg-soft);
        color: var(--ink);
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }
      .admin-field input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(0, 98, 65, 0.12);
        background: #fff;
      }
      .admin-submit {
        margin-top: 8px;
        padding: 11px 16px;
        background: var(--accent);
        color: var(--accent-ink);
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition: background 0.15s ease, transform 0.05s ease;
      }
      .admin-submit:hover {
        background: var(--accent-deep);
      }
      .admin-submit:active {
        transform: translateY(1px);
      }
      .admin-submit:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .admin-error {
        margin-top: 4px;
        min-height: 18px;
        color: var(--danger);
        font-size: 13px;
      }
      .admin-greeting {
        margin: 0 0 20px;
        text-align: center;
        color: var(--ink);
        font-size: 15px;
      }
      .admin-greeting strong {
        color: var(--accent);
      }
      .admin-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .admin-actions a {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 14px 12px;
        background: var(--bg-soft);
        border: 1px solid var(--line);
        border-radius: 10px;
        color: var(--ink);
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.15s ease;
      }
      .admin-actions a:hover {
        background: var(--accent-soft);
        border-color: var(--accent);
        color: var(--accent-deep);
        transform: translateY(-1px);
        box-shadow: var(--shadow-sm);
      }
      .admin-actions a.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: var(--accent-ink);
      }
      .admin-actions a.primary:hover {
        background: var(--accent-deep);
        border-color: var(--accent-deep);
        color: var(--accent-ink);
      }
      .admin-logout {
        margin-top: 20px;
        text-align: center;
      }
      .admin-logout button {
        background: none;
        border: none;
        color: var(--muted);
        font-size: 13px;
        font-family: inherit;
        cursor: pointer;
        text-decoration: underline;
      }
      .admin-logout button:hover {
        color: var(--danger);
      }
      .admin-loading {
        padding: 40px 0;
        text-align: center;
        color: var(--muted);
        font-size: 14px;
      }
      [hidden] {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card admin-shell">
        <header class="topbar">
          <h1>后台管理</h1>
        </header>

        <div class="admin-body">
          <div id="loadingPane" class="admin-loading">加载中…</div>

          <!-- 未登录：登录表单 -->
          <div id="loginPane" hidden>
            <p class="admin-subtitle">请使用管理员账号登录以访问后台</p>
            <form id="loginForm" class="admin-form" autocomplete="off">
              <div class="admin-field">
                <label for="loginUser">用户名</label>
                <input type="text" id="loginUser" name="user" required autocomplete="username" />
              </div>
              <div class="admin-field">
                <label for="loginPassword">密码</label>
                <input type="password" id="loginPassword" name="password" required autocomplete="current-password" />
              </div>
              <div id="loginError" class="admin-error" role="alert" aria-live="polite"></div>
              <button type="submit" id="loginSubmit" class="admin-submit">登录</button>
            </form>
          </div>

          <!-- 已登录：控制台 -->
          <div id="consolePane" hidden>
            <p class="admin-greeting">
              欢迎，<strong id="adminUserLabel">admin</strong>
            </p>
            <nav class="admin-actions">
              <a href="/user">用户映射管理</a>
              <a href="/billpage">Team 月度账单</a>
              <a href="/costcenter">Cost Center 管理</a>
              <a href="/" class="primary">返回用量看板</a>
            </nav>
            <div class="admin-logout">
              <button type="button" id="logoutBtn">退出登录</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="./admin.js"></script>
  </body>
</html>
